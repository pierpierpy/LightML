   AUTO-REFRESH
   ====================================================================== */
let _autoRefreshId = null;
function toggleAutoRefresh(sec = 30) {
    if (_autoRefreshId) { clearInterval(_autoRefreshId); _autoRefreshId = null; return; }
    _autoRefreshId = setInterval(refresh, sec * 1000);
}

/* ======================================================================
   FILTER DROPDOWNS → CHIP BARS + BUILDER PANEL
   ====================================================================== */

function initFilters() {
    if (!DATA) return;

    // Build all metric keys from DATA.metrics
    const keySet = new Set();
    for (const m of DATA.metrics) keySet.add(`${m.family}/${m.metric_name}`);
    allMetricKeys = [...keySet].sort();

    visibleFamilies.clear();
    DATA.families.forEach(f => visibleFamilies.add(f));

    visibleMetrics.clear();
    allMetricKeys.forEach(k => visibleMetrics.add(k));
    columnOrder = [...allMetricKeys];
    renderMetricChips();

    visibleModels.clear();
    DATA.models.forEach(m => visibleModels.add(m.model_name));
    renderModelChips();
}

/* ── Metric Chip Bar ─────────────────────────────── */
function metricDisplayName(key) {
    const i = key.indexOf('/');
    return i >= 0 ? key.substring(i + 1) : key;
}
function metricFamily(key) {
    const i = key.indexOf('/');
    return i >= 0 ? key.substring(0, i) : '';
}

function renderMetricChips() {
    const bar = document.getElementById('metricChipBar');
    if (!bar) return;
    const total = allMetricKeys.length;
    if (columnOrder.length === total) {
        bar.innerHTML = `<div class="chip" style="cursor:default;"><span>All metrics (${total})</span></div>`;
        return;
    }
    if (columnOrder.length === 0) {
        bar.innerHTML = `<span style="font-size:11px;color:#6b7280;font-style:italic;">No metrics selected</span>`;
        return;
    }
    bar.innerHTML = columnOrder.map((key, i) =>
        `<div class="chip" draggable="true" data-type="metric" data-name="${esc(key)}" data-index="${i}"
              ondragstart="chipDragStart(event)" ondragover="chipDragOver(event)"
              ondragend="chipDragEnd(event)" ondrop="chipDrop(event)"
              title="${esc(key)}">
            <span class="chip-fam-tag">${esc(metricFamily(key))}/</span>${esc(metricDisplayName(key))}
            <button class="chip-remove" onclick="event.stopPropagation(); removeChip('metric','${esc(key)}')" title="Remove">&times;</button>
        </div>`
    ).join('');
}

/* ── Model Chip Bar ──────────────────────────────── */
function renderModelChips() {
    const bar = document.getElementById('modelChipBar');
    if (!bar || !DATA) return;
    const total = DATA.models.length;
    const visible = visibleModels.size;
    if (visible === total) {
        bar.innerHTML = `<div class="chip chip-model" style="cursor:default;">
            <span>All models (${total})</span>
        </div>`;
        return;
    }
    if (visible === 0) {
        bar.innerHTML = `<span style="font-size:11px;color:#6b7280;font-style:italic;">No models selected</span>`;
        return;
    }
    const models = [...visibleModels];
    const display = models.slice(0, 20);
    bar.innerHTML = display.map(m =>
        `<div class="chip chip-model" data-type="model" data-name="${esc(m)}">
            <span>${esc(m)}</span>
            <button class="chip-remove" onclick="event.stopPropagation(); removeChip('model','${esc(m)}')" title="Remove">&times;</button>
        </div>`
    ).join('') + (models.length > 20 ? `<span style="font-size:11px;color:#6b7280;">+${models.length - 20} more</span>` : '');
}

function removeChip(type, name) {
    if (type === 'metric') {
        columnOrder = columnOrder.filter(k => k !== name);
        visibleMetrics.delete(name);
        renderMetricChips();
        renderTable();
    } else {
        visibleModels.delete(name);
        renderModelChips();
        renderTable();
    }
}

/* ── Chip Drag & Drop (reorder metrics) ──────────── */
let chipDragIdx = null;

function chipDragStart(e) {
    const chip = e.target.closest('.chip');
    chipDragIdx = parseInt(chip.dataset.index);
    chip.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(chipDragIdx));
}

function chipDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
}

function chipDrop(e) {
    e.preventDefault();
    const targetChip = e.target.closest('.chip');
    if (!targetChip || chipDragIdx === null) return;
    const targetIdx = parseInt(targetChip.dataset.index);
    if (chipDragIdx === targetIdx) return;
    const [moved] = columnOrder.splice(chipDragIdx, 1);
    columnOrder.splice(targetIdx, 0, moved);
    chipDragIdx = null;
    renderMetricChips();
    renderTable();
}

function chipDragEnd() {
    chipDragIdx = null;
    document.querySelectorAll('.chip.dragging').forEach(c => c.classList.remove('dragging'));
}

/* ── Builder Panel ───────────────────────────────── */
function openBuilder(type) {
    builderType = type;
    document.getElementById('builderTitle').textContent = type === 'metric' ? 'Select Metrics' : 'Select Models';
    document.getElementById('builderSearch').value = '';
    document.getElementById('builderOverlay').classList.add('open');
    renderBuilderItems();
}

function closeBuilder() {
    document.getElementById('builderOverlay').classList.remove('open');
    builderType = null;
}

function renderBuilderItems(searchTerm) {
    const list = document.getElementById('builderList');
    if (!DATA) return;
    const term = (searchTerm || '').toLowerCase();
    if (builderType === 'metric') {
        // Group metrics by family
        const grouped = {};
        for (const key of allMetricKeys) {
            const fam = metricFamily(key);
            if (!grouped[fam]) grouped[fam] = [];
            grouped[fam].push(key);
        }
        let html = '';
        for (const fam of Object.keys(grouped).sort()) {
            const metrics = grouped[fam].filter(k => !term || k.toLowerCase().includes(term));
            if (!metrics.length) continue;
            const allOn = metrics.every(k => visibleMetrics.has(k));
            html += `<div style="padding:8px 12px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#60a5fa;display:flex;align-items:center;gap:8px;">`;
            html += `<span>${esc(fam)}</span>`;
            html += `<button class="builder-act-btn" style="font-size:9px;padding:2px 8px;" onclick="toggleFamilyMetrics('${esc(fam)}')">${allOn ? 'None' : 'All'}</button>`;
            html += `</div>`;
            for (const key of metrics) {
                const active = visibleMetrics.has(key) ? 'active' : '';
                html += `<div class="builder-item ${active}" onclick="toggleBuilderItem('metric','${esc(key)}')">
                    <span class="bi-check">&#x2713;</span>
                    <span class="bi-name">${esc(metricDisplayName(key))}</span>
                </div>`;
            }
        }
        list.innerHTML = html;
    } else {
        const items = DATA.models.filter(m => !term || m.model_name.toLowerCase().includes(term));
        list.innerHTML = items.map(m => {
            const active = visibleModels.has(m.model_name) ? 'active' : '';
            return `<div class="builder-item ${active}" onclick="toggleBuilderItem('model','${esc(m.model_name)}')">
                <span class="bi-check">&#x2713;</span>
                <span class="bi-name">${esc(m.model_name)}</span>
            </div>`;
        }).join('');
    }
}

function filterBuilderItems() {
    renderBuilderItems(document.getElementById('builderSearch').value);
}

function toggleFamilyMetrics(fam) {
    const keys = allMetricKeys.filter(k => metricFamily(k) === fam);
    const allOn = keys.every(k => visibleMetrics.has(k));
    if (allOn) {
        keys.forEach(k => { visibleMetrics.delete(k); columnOrder = columnOrder.filter(c => c !== k); });
    } else {
        keys.forEach(k => { if (!visibleMetrics.has(k)) { visibleMetrics.add(k); columnOrder.push(k); } });
    }
    renderMetricChips();
    renderTable();
    renderBuilderItems(document.getElementById('builderSearch').value);
}

function toggleBuilderItem(type, name) {
    if (type === 'metric') {
        if (visibleMetrics.has(name)) {
            visibleMetrics.delete(name);
            columnOrder = columnOrder.filter(k => k !== name);
        } else {
            visibleMetrics.add(name);
            columnOrder.push(name);
        }
        renderMetricChips();
        renderTable();
    } else {
        if (visibleModels.has(name)) visibleModels.delete(name);
        else visibleModels.add(name);
        renderModelChips();
        renderTable();
    }
    renderBuilderItems(document.getElementById('builderSearch').value);
}

function builderSelectAll() {
    if (builderType === 'metric') {
        allMetricKeys.forEach(k => {
            if (!visibleMetrics.has(k)) {
                visibleMetrics.add(k);
                columnOrder.push(k);
            }
        });
        renderMetricChips();
        renderTable();
    } else {
        DATA.models.forEach(m => visibleModels.add(m.model_name));
        renderModelChips();
        renderTable();
    }
    renderBuilderItems(document.getElementById('builderSearch').value);
}

function builderSelectNone() {
    if (builderType === 'metric') {
        visibleMetrics.clear();
        columnOrder = [];
        renderMetricChips();
        renderTable();
    } else {
        visibleModels.clear();
        renderModelChips();
        renderTable();
    }
    renderBuilderItems(document.getElementById('builderSearch').value);
}

/* ======================================================================
   SAVED FILTERS (localStorage-backed)
   ====================================================================== */
let activeFilterName = null;

function filtersStorageKey() {
    return 'lightml_filters_' + (DATA ? DATA.db_name : 'default');
}

function loadSavedFilters() {
    try { return JSON.parse(localStorage.getItem(filtersStorageKey()) || '[]'); }
    catch { return []; }
}

function persistFilters(filters) {
    localStorage.setItem(filtersStorageKey(), JSON.stringify(filters));
}

function saveCurrentFilter() {
    const models = [...visibleModels];
    if (!models.length) { alert('No models selected to save.'); return; }
    if (models.length === DATA.models.length) { alert('All models are selected — filter would have no effect.'); return; }
    const name = prompt('Filter name:');
    if (!name || !name.trim()) return;
    const filters = loadSavedFilters();
    const existing = filters.findIndex(f => f.name === name.trim());
    const entry = { name: name.trim(), models };
    if (existing >= 0) filters[existing] = entry;
    else filters.push(entry);
    persistFilters(filters);
    activeFilterName = name.trim();
    renderSavedFilters();
}

function applySavedFilter(name) {
    const filters = loadSavedFilters();
    const f = filters.find(x => x.name === name);
    if (!f) return;
    if (activeFilterName === name) {
        // Toggle off: restore all models
        activeFilterName = null;
        visibleModels.clear();
        DATA.models.forEach(m => visibleModels.add(m.model_name));
    } else {
        activeFilterName = name;
        visibleModels.clear();
        f.models.forEach(m => visibleModels.add(m));
    }
    renderModelChips();
    renderTable();
    renderSavedFilters();
}

function deleteSavedFilter(name, e) {
    e.stopPropagation();
    const filters = loadSavedFilters().filter(f => f.name !== name);
    persistFilters(filters);
    if (activeFilterName === name) activeFilterName = null;
    renderSavedFilters();
}

function renderSavedFilters() {
    const bar = document.getElementById('savedFilterBar');
    const section = document.getElementById('savedFilterSection');
    if (!bar || !section) return;
    const filters = loadSavedFilters();
    if (!filters.length) { section.style.display = 'none'; return; }
    section.style.display = '';
    bar.innerHTML = filters.map(f => {
        const cls = f.name === activeFilterName ? 'saved-filter-chip active' : 'saved-filter-chip';
        return `<div class="${cls}" onclick="applySavedFilter('${esc(f.name)}')" title="${f.models.length} models">
            <span>🏷️ ${esc(f.name)}</span>
            <span style="font-size:9px;color:#9ca3af;">(${f.models.length})</span>
            <button class="sf-remove" onclick="deleteSavedFilter('${esc(f.name)}', event)" title="Delete filter">&times;</button>
        </div>`;
    }).join('');
}

/* ── Builder ──────────────────────────────────────── */
function openChartBuilder(prefill) {
    if (!DATA) return;
    const pName = prefill ? prefill.name : '';
    const pType = prefill ? prefill.type : 'radar';
    const pModels = prefill ? new Set(prefill.models) : new Set();
    const pMetrics = prefill ? new Set(prefill.metrics) : new Set();
    document.getElementById('cbName').value = pName;
    cbSelectedType = pType;
    document.querySelectorAll('.cb-type-btn').forEach(b => b.classList.toggle('selected', b.dataset.type === pType));

    // Populate model picker
    const mp = document.getElementById('cbModelPicker');
    mp.innerHTML = DATA.models.map(m =>
        `<label class="cb-pick-item"><input type="checkbox" value="${esc(m.model_name)}"${pModels.has(m.model_name) ? ' checked' : ''}> ${esc(m.model_name)}</label>`
    ).join('');

    // Populate metric picker grouped by family
    const grouped = {};
    for (const key of allMetricKeys) {
        const fam = metricFamily(key);
        if (!grouped[fam]) grouped[fam] = [];
        grouped[fam].push(key);
    }
    const metp = document.getElementById('cbMetricPicker');
    let mhtml = '';
    for (const fam of Object.keys(grouped).sort()) {
        mhtml += `<div class="cb-pick-group-hdr">${esc(fam)}</div>`;
        for (const key of grouped[fam]) {
            mhtml += `<label class="cb-pick-item"><input type="checkbox" value="${esc(key)}"${pMetrics.has(key) ? ' checked' : ''}> ${esc(metricDisplayName(key))}</label>`;
        }
    }
    metp.innerHTML = mhtml;

    document.getElementById('cbOverlay').classList.add('open');
}

function closeChartBuilder() {
    editingChartId = null;
    document.getElementById('cbOverlay').classList.remove('open');
}

function selectChartType(type) {
    cbSelectedType = type;
    document.querySelectorAll('.cb-type-btn').forEach(b => b.classList.toggle('selected', b.dataset.type === type));
}

function saveChart() {
    const name = document.getElementById('cbName').value.trim() || ('Chart ' + (loadSavedCharts().length + 1));
    const models = [...document.querySelectorAll('#cbModelPicker input:checked')].map(i => i.value);
    const metrics = [...document.querySelectorAll('#cbMetricPicker input:checked')].map(i => i.value);

    if (models.length < 1) { alert('Select at least 1 model.'); return; }
    if (metrics.length < 1) { alert('Select at least 1 metric.'); return; }
    if (cbSelectedType === 'radar' && metrics.length < 3) { alert('Radar charts need at least 3 metrics.'); return; }
    if (cbSelectedType === 'pivot' && metrics.length < 1) { alert('Pivot needs at least 1 metric.'); return; }

    const charts = loadSavedCharts();
    if (editingChartId) {
        const idx = charts.findIndex(c => c.id === editingChartId);
        if (idx !== -1) {
            charts[idx] = { ...charts[idx], name, type: cbSelectedType, models, metrics };
        }
    } else {
        charts.push({
            id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
            name, type: cbSelectedType, models, metrics,
            created: new Date().toISOString()
        });
    }
    persistCharts(charts);
    closeChartBuilder();
    renderSavedCharts();
}

function deleteSavedChart(id) {
    if (!confirm('Delete this chart?')) return;
    const charts = loadSavedCharts().filter(c => c.id !== id);
    persistCharts(charts);
    renderSavedCharts();
}

function editChart(id) {
    const chart = loadSavedCharts().find(c => c.id === id);
    if (!chart) return;
    editingChartId = id;
    openChartBuilder(chart);
}

function duplicateChart(id) {
    const charts = loadSavedCharts();
    const src = charts.find(c => c.id === id);
    if (!src) return;
    const dup = { ...src, id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), name: src.name + ' (copy)' };
    charts.push(dup);
    persistCharts(charts);
    renderSavedCharts();
}

const CHART_SIZES = ['1x1','2x1','1x2','2x2'];
const CHART_SIZE_LABELS = { '1x1':'Small', '2x1':'Wide', '1x2':'Tall', '2x2':'Large' };
const GRIP_SVG = `<svg viewBox="0 0 12 12" fill="none"><circle cx="6" cy="10" r="1.2" fill="#6b7280"/><circle cx="10" cy="10" r="1.2" fill="#6b7280"/><circle cx="10" cy="6" r="1.2" fill="#6b7280"/></svg>`;

            <div class="chart-card-header">

                <div class="chart-card-actions">
                    <button title="Edit" onclick="editChart('${c.id}')">✏️</button>

                </div>
            </div>
            <div class="chart-card-body" id="ccb-${c.id}"></div>
            <div class="chart-resize-grip" data-chart-id="${c.id}">${GRIP_SVG}</div>
            <div class="chart-size-toast" id="cst-${c.id}"></div>
        </div>`;
    }).join('');

    for (const c of charts) renderChartD3(c);
    initResizeGrips();
    initDragGrips();

function initResizeGrips() {
    document.querySelectorAll('.chart-resize-grip').forEach(grip => {
        grip.addEventListener('mousedown', onGripDown);
        grip.addEventListener('touchstart', onGripDown, { passive: false });
    });
}

function onGripDown(e) {
    e.preventDefault();
    const grip = e.currentTarget;
    const chartId = grip.dataset.chartId;
    const card = document.getElementById('cc-' + chartId);
    if (!card) return;

    const toast = document.getElementById('cst-' + chartId);
    const startX = e.touches ? e.touches[0].clientX : e.clientX;
    const startY = e.touches ? e.touches[0].clientY : e.clientY;
    const startSize = card.dataset.size || '1x1';
    const [startCols, startRows] = startSize.split('x').map(Number);

    // Get one grid cell size
    const rect = card.getBoundingClientRect();
    const cellW = rect.width / startCols;
    const cellH = rect.height / startRows;

    let curCols = startCols, curRows = startRows;
    toast.textContent = CHART_SIZE_LABELS[startSize];
    toast.classList.add('visible');
    card.style.transition = 'none';

    function onMove(ev) {
        const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
        const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
        const dx = cx - startX;
        const dy = cy - startY;

        let newCols = Math.round(startCols + dx / cellW);
        let newRows = Math.round(startRows + dy / cellH);
        newCols = Math.max(1, Math.min(2, newCols));
        newRows = Math.max(1, Math.min(2, newRows));

        if (newCols !== curCols || newRows !== curRows) {
            curCols = newCols;
            curRows = newRows;
            const newSize = curCols + 'x' + curRows;
            card.className = card.className.replace(/size-\S+/, 'size-' + newSize);
            card.dataset.size = newSize;
            toast.textContent = CHART_SIZE_LABELS[newSize];
            renderChartD3({ ...loadSavedCharts().find(c => c.id === chartId), _container: true });
        }
    }

    function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onUp);
        card.style.transition = '';
        toast.classList.remove('visible');

        const finalSize = curCols + 'x' + curRows;
        const charts = loadSavedCharts();
        const idx = charts.findIndex(c => c.id === chartId);
        if (idx !== -1) {
            charts[idx].size = finalSize;
            delete charts[idx].width;
            delete charts[idx].height;
            persistCharts(charts);
        }
        // final re-render at correct size
        setTimeout(() => renderChartD3(charts[idx] || charts.find(c => c.id === chartId)), 50);
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
}

/* ── Get metric data for chart ─────────────────── */
function getChartData(chart) {
    if (!DATA) return [];
    // Build model_name → { metric_key → value }
    const modelIds = {};
    for (const m of DATA.models) {
        if (chart.models.includes(m.model_name)) modelIds[m.id] = m.model_name;
    }
    const result = {};
    for (const name of chart.models) result[name] = {};
    for (const m of DATA.metrics) {
        const mName = modelIds[m.model_id];
        if (!mName) continue;
        if (m.checkpoint_id) continue;
        const key = `${m.family}/${m.metric_name}`;
        if (chart.metrics.includes(key)) result[mName][key] = m.value;
    }
    return result;
}

/* ── D3 Chart Renderers ─────────────────────────── */
function renderChartD3(chart) {
    const container = document.getElementById('ccb-' + chart.id);
    if (!container) return;
    const data = getChartData(chart);
    container.innerHTML = '';

    if (chart.type === 'radar') renderRadar(container, chart, data);
    else if (chart.type === 'bar') renderBarChart(container, chart, data, false);
    else if (chart.type === 'hbar') renderBarChart(container, chart, data, true);
    else if (chart.type === 'table') renderTableChart(container, chart, data);
    else if (chart.type === 'pivot') renderPivotChart(container, chart, data);
}

/* ── RADAR CHART ───────────────────────────────── */
function renderRadar(container, chart, data) {
    const W = container.clientWidth || 460;
    const H = container.clientHeight || 340;
    const margin = 50;
    const R = Math.min(W, H) / 2 - margin;
    const cx = W / 2, cy = H / 2;
    const metrics = chart.metrics;
    const n = metrics.length;
    const angleSlice = (2 * Math.PI) / n;

    const svg = d3.select(container).append('svg').attr('width', W).attr('height', H);
    const g = svg.append('g').attr('transform', `translate(${cx},${cy})`);

    // Normalize: find max per metric across models to scale 0-1
    const maxVals = {};
    for (const mk of metrics) {
        let mx = 0;
        for (const mName of chart.models) {
            const v = data[mName]?.[mk];
            if (v != null && v > mx) mx = v;
        }
        maxVals[mk] = mx || 1;
    }

    // Grid circles
    const levels = 5;
    for (let l = 1; l <= levels; l++) {
        const r = (R / levels) * l;
        g.append('circle').attr('r', r)
            .attr('fill', 'none').attr('stroke', '#334155').attr('stroke-dasharray', '3,3');
        g.append('text').attr('x', 4).attr('y', -r - 2)
            .attr('font-size', '9px').attr('fill', '#4b5563')
            .text(Math.round((l / levels) * 100) + '%');
    }

    // Axes
    for (let i = 0; i < n; i++) {
        const angle = angleSlice * i - Math.PI / 2;
        const x = Math.cos(angle) * R;
        const y = Math.sin(angle) * R;
        g.append('line').attr('x1', 0).attr('y1', 0).attr('x2', x).attr('y2', y)
            .attr('stroke', '#334155');
        const lx = Math.cos(angle) * (R + 18);
        const ly = Math.sin(angle) * (R + 18);
        const label = metricDisplayName(metrics[i]);
        const shortLabel = label.length > 18 ? label.slice(0, 15) + '…' : label;
        g.append('text').attr('x', lx).attr('y', ly)
            .attr('text-anchor', Math.abs(lx) < 5 ? 'middle' : lx > 0 ? 'start' : 'end')
            .attr('dominant-baseline', 'central')
            .attr('font-size', '10px').attr('fill', '#9ca3af')
            .text(shortLabel);
    }

    // Data polygons
    chart.models.forEach((modelName, mi) => {
        const points = metrics.map((mk, i) => {
            const v = data[modelName]?.[mk] ?? 0;
            const norm = v / maxVals[mk];
            const angle = angleSlice * i - Math.PI / 2;
            return [Math.cos(angle) * R * norm, Math.sin(angle) * R * norm];
        });
        const color = CHART_COLORS[mi % CHART_COLORS.length];
        const path = points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0] + ',' + p[1]).join(' ') + 'Z';
        g.append('path').attr('d', path)
            .attr('fill', color).attr('fill-opacity', 0.12)
            .attr('stroke', color).attr('stroke-width', 2);
        // Dots
        points.forEach((p, i) => {
            const v = data[modelName]?.[metrics[i]] ?? 0;
            const dot = g.append('circle').attr('cx', p[0]).attr('cy', p[1]).attr('r', 4)
                .attr('fill', color).attr('stroke', '#1e293b').attr('stroke-width', 1.5)
                .style('cursor', 'default');
            dot.append('title').text(`${modelName}\\n${metricDisplayName(metrics[i])}: ${formatVal(v)}`);
        });
    });

    // Legend
    const lgH = chart.models.length * 20 + 12;
    const legend = svg.append('g').attr('transform', `translate(8, ${H - lgH})`);
    legend.append('rect').attr('width', 200).attr('height', lgH).attr('rx', 6)
        .attr('fill', 'rgba(15,23,42,0.85)').attr('stroke', '#334155').attr('stroke-width', 1);
    chart.models.forEach((name, i) => {
        const lg = legend.append('g').attr('transform', `translate(8, ${i * 20 + 8})`);
        lg.append('rect').attr('width', 12).attr('height', 12).attr('rx', 3).attr('fill', CHART_COLORS[i % CHART_COLORS.length]);
        lg.append('text').attr('x', 18).attr('y', 10).attr('font-size', '11px').attr('fill', '#e2e8f0').attr('font-weight', '500')
            .text(name.length > 25 ? name.slice(0, 22) + '…' : name);
    });
}

/* ── BAR CHART (vertical & horizontal) ─────────── */
function renderBarChart(container, chart, data, horizontal) {
    const W = container.clientWidth || 460;
    const H = container.clientHeight || Math.max(340, horizontal ? chart.metrics.length * chart.models.length * 22 + 80 : 340);
    const margin = horizontal ? { top: 30, right: 20, bottom: 30, left: 180 } : { top: 30, right: 20, bottom: 80, left: 50 };

    const svg = d3.select(container).append('svg').attr('width', W).attr('height', H);
    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
    const iw = W - margin.left - margin.right;
    const ih = H - margin.top - margin.bottom;

    const metricLabels = chart.metrics.map(metricDisplayName);
    const groupScale = horizontal
        ? d3.scaleBand().domain(metricLabels).range([0, ih]).padding(0.2)
        : d3.scaleBand().domain(metricLabels).range([0, iw]).padding(0.2);
    const modelScale = d3.scaleBand().domain(chart.models).range([0, groupScale.bandwidth()]).padding(0.05);

    let maxVal = 0;
    for (const mk of chart.metrics) {
        for (const mName of chart.models) {
            const v = data[mName]?.[mk] ?? 0;
            if (v > maxVal) maxVal = v;
        }
    }
    maxVal = maxVal <= 1 ? 1 : maxVal * 1.1;

    const valScale = horizontal
        ? d3.scaleLinear().domain([0, maxVal]).range([0, iw]).nice()
        : d3.scaleLinear().domain([0, maxVal]).range([ih, 0]).nice();

    // Axes
    if (horizontal) {
        g.append('g').call(d3.axisLeft(groupScale)).selectAll('text').attr('fill', '#9ca3af').attr('font-size', '10px');
        g.append('g').attr('transform', `translate(0,${ih})`).call(d3.axisBottom(valScale).ticks(6).tickFormat(v => v <= 1 ? (v * 100).toFixed(0) + '%' : v))
            .selectAll('text').attr('fill', '#6b7280').attr('font-size', '9px');
    } else {
        g.append('g').attr('transform', `translate(0,${ih})`).call(d3.axisBottom(groupScale))
            .selectAll('text').attr('fill', '#9ca3af').attr('font-size', '10px')
            .attr('transform', 'rotate(-35)').attr('text-anchor', 'end');
        g.append('g').call(d3.axisLeft(valScale).ticks(6).tickFormat(v => v <= 1 ? (v * 100).toFixed(0) + '%' : v))
            .selectAll('text').attr('fill', '#6b7280').attr('font-size', '9px');
    }
    g.selectAll('.domain, .tick line').attr('stroke', '#334155');

    // Grid
    if (horizontal) {
        g.selectAll('.grid').data(valScale.ticks(6)).join('line')
            .attr('x1', d => valScale(d)).attr('x2', d => valScale(d))
            .attr('y1', 0).attr('y2', ih).attr('stroke', '#1e293b');
    } else {
        g.selectAll('.grid').data(valScale.ticks(6)).join('line')
            .attr('x1', 0).attr('x2', iw)
            .attr('y1', d => valScale(d)).attr('y2', d => valScale(d)).attr('stroke', '#1e293b');
    }

    // Bars
    chart.metrics.forEach((mk, mi) => {
        const label = metricDisplayName(mk);
        chart.models.forEach((model, mdi) => {
            const v = data[model]?.[mk] ?? 0;
            const color = CHART_COLORS[mdi % CHART_COLORS.length];
            if (horizontal) {
                const bar = g.append('rect')
                    .attr('y', groupScale(label) + modelScale(model))
                    .attr('x', 0)
                    .attr('height', modelScale.bandwidth())
                    .attr('width', valScale(v))
                    .attr('fill', color).attr('rx', 3);
                bar.append('title').text(`${model}: ${formatVal(v)}`);
            } else {
                const bar = g.append('rect')
                    .attr('x', groupScale(label) + modelScale(model))
                    .attr('y', valScale(v))
                    .attr('width', modelScale.bandwidth())
                    .attr('height', ih - valScale(v))
                    .attr('fill', color).attr('rx', 3);
                bar.append('title').text(`${model}: ${formatVal(v)}`);
            }
        });
    });

    // Legend
    const lgW = chart.models.length * 160;
    const legend = svg.append('g').attr('transform', `translate(${margin.left + 4}, 2)`);
    legend.append('rect').attr('width', Math.min(lgW + 10, W - margin.left)).attr('height', 22).attr('rx', 6)
        .attr('fill', 'rgba(15,23,42,0.85)').attr('stroke', '#334155').attr('stroke-width', 1);
    chart.models.forEach((name, i) => {
        const lg = legend.append('g').attr('transform', `translate(${i * 160 + 6}, 4)`);
        lg.append('rect').attr('width', 12).attr('height', 12).attr('rx', 3).attr('fill', CHART_COLORS[i % CHART_COLORS.length]);
        lg.append('text').attr('x', 18).attr('y', 10).attr('font-size', '11px').attr('fill', '#e2e8f0').attr('font-weight', '500')
            .text(name.length > 18 ? name.slice(0, 15) + '…' : name);
    });
}

/* ── TABLE CHART ───────────────────────────────── */
function renderTableChart(container, chart, data) {
    // Models as rows, metrics as columns (like main table view)
    let html = '<div class="chart-table-wrap"><table><thead><tr><th>Model</th>';
    for (const mk of chart.metrics) {
        html += `<th>${esc(metricDisplayName(mk))}</th>`;
    }
    html += '</tr></thead><tbody>';

    // Find best per metric for highlighting
    const best = {};
    for (const mk of chart.metrics) {
        let mx = -Infinity;
        for (const m of chart.models) { const v = data[m]?.[mk]; if (v != null && v > mx) mx = v; }
        if (mx > -Infinity) best[mk] = mx;
    }

    for (const model of chart.models) {
        html += `<tr><td class="ct-model">${esc(model)}</td>`;
        for (const mk of chart.metrics) {
            const v = data[model]?.[mk];
            if (v == null) { html += '<td style="color:#4b5563;">—</td>'; }
            else {
                const cls = best[mk] === v ? 'ct-best' : '';
                html += `<td class="${cls}">${formatVal(v)}</td>`;
            }
        }
        html += '</tr>';
    }
    html += '</tbody></table></div>';
    container.innerHTML = html;
}

/* ── PIVOT CHART ───────────────────────────────── */
function renderPivotChart(container, chart, data) {
    // Metrics as rows, models as columns (transposed)
    let html = '<div class="chart-table-wrap"><table><thead><tr><th>Metric</th>';
    for (const model of chart.models) {
        html += `<th>${esc(model)}</th>`;
    }
    html += '</tr></thead><tbody>';

    // Group metrics by family
    const grouped = {};
    for (const mk of chart.metrics) {
        const fam = metricFamily(mk);
        if (!grouped[fam]) grouped[fam] = [];
        grouped[fam].push(mk);
    }

    for (const fam of Object.keys(grouped).sort()) {
        if (Object.keys(grouped).length > 1) {
            html += `<tr><td class="ct-pivot-hdr" colspan="${chart.models.length + 1}">${esc(fam)}</td></tr>`;
        }
        for (const mk of grouped[fam]) {
            // Find best in this row
            let mx = -Infinity;
            for (const m of chart.models) { const v = data[m]?.[mk]; if (v != null && v > mx) mx = v; }

            html += `<tr><td class="ct-model">${esc(metricDisplayName(mk))}</td>`;
            for (const model of chart.models) {
                const v = data[model]?.[mk];
                if (v == null) { html += '<td style="color:#4b5563;">—</td>'; }
                else {
                    const cls = mx === v ? 'ct-best' : '';
                    html += `<td class="${cls}">${formatVal(v)}</td>`;
                }
            }
            html += '</tr>';
        }
    }
    html += '</tbody></table></div>';
    container.innerHTML = html;
}

/* ── DRAG TO REORDER ───────────────────────────── */
let dragChartId = null;

function initDragGrips() {
    document.querySelectorAll('.chart-drag-grip').forEach(grip => {
        grip.addEventListener('mousedown', onDragStart);
        grip.addEventListener('touchstart', onDragStart, { passive: false });
    });
}

function onDragStart(e) {
    e.preventDefault();
    const chartId = e.currentTarget.dataset.chartId;
    const card = document.getElementById('cc-' + chartId);
    if (!card) return;
    dragChartId = chartId;
    card.classList.add('dragging-card');

    function onMove(ev) {
        const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
        const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
        // Find card under cursor
        const el = document.elementFromPoint(cx, cy);
        const targetCard = el ? el.closest('.chart-card') : null;
        document.querySelectorAll('.chart-card.drop-target').forEach(c => c.classList.remove('drop-target'));
        if (targetCard && targetCard.dataset.chartId && targetCard.dataset.chartId !== chartId) {
            targetCard.classList.add('drop-target');
        }
    }

    function onUp(ev) {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onUp);
        card.classList.remove('dragging-card');

        // Find drop target
        const cx = ev.changedTouches ? ev.changedTouches[0].clientX : ev.clientX;
        const cy = ev.changedTouches ? ev.changedTouches[0].clientY : ev.clientY;
        const el = document.elementFromPoint(cx, cy);
        const targetCard = el ? el.closest('.chart-card') : null;
        document.querySelectorAll('.chart-card.drop-target').forEach(c => c.classList.remove('drop-target'));

        if (targetCard && targetCard.dataset.chartId && targetCard.dataset.chartId !== chartId) {
            // Swap positions in saved charts array
            const charts = loadSavedCharts();
            const srcIdx = charts.findIndex(c => c.id === chartId);
            const dstIdx = charts.findIndex(c => c.id === targetCard.dataset.chartId);
            if (srcIdx !== -1 && dstIdx !== -1) {
                const [moved] = charts.splice(srcIdx, 1);
                charts.splice(dstIdx, 0, moved);
                persistCharts(charts);
                renderSavedCharts();
            }
        }
        dragChartId = null;
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
}
</script>
